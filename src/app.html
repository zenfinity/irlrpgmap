<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet" />
		<!-- Restore saved theme before first paint to avoid flash -->
		<script>
			try {
				const t = localStorage.getItem('irlrpg_theme');
				if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
			} catch {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
